name: Generate secrets folder

# Supervisor: go to Actions tab → "Generate secrets folder" → Run workflow
# Download the artifact → extract into the project root → run the app normally.

on:
  workflow_dispatch:

jobs:
  build-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Create secrets directory
        run: mkdir -p secrets

      - name: Write ai_config.json
        run: |
          cat > secrets/ai_config.json <<'EOF'
          {
            "HF_BASE_URL": "${{ secrets.HF_BASE_URL }}",
            "HF_TOKEN": "${{ secrets.HF_TOKEN }}"
          }
          EOF

      - name: Write database.json
        run: |
          cat > secrets/database.json <<'EOF'
          {
            "POSTGRES_URL": "${{ secrets.POSTGRES_URL }}"
          }
          EOF

      - name: Write google_oauth.json
        run: |
          cat > secrets/google_oauth.json <<'EOF'
          {
            "GOOGLE_CLIENT_ID": "${{ secrets.GOOGLE_CLIENT_ID }}",
            "GOOGLE_CLIENT_SECRET": "${{ secrets.GOOGLE_CLIENT_SECRET }}"
          }
          EOF

      - name: Write analytics_service_account.json
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > secrets/analytics_service_account.json

      - name: Write token adminmail.json
        run: echo '${{ secrets.GMAIL_TOKEN_JSON }}' > 'secrets/token adminmail.json'

      - name: Upload secrets artifact
        uses: actions/upload-artifact@v4
        with:
          name: secrets
          path: secrets/
          retention-days: 1
